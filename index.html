<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ───────────────────────────────────────────── -->
    <title>Pradeep Malhotra • Premium Astrology &amp; Spiritual Consultation</title>
    <meta name="description" content="Personalized Vedic astrology consultations by Pradeep Malhotra. Expert guidance on life, career, relationships, numerology, and Vaastu. Book your session online." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Pradeep Malhotra" />

    <!-- ── Canonical (updated per route by useSEO hook) ─────────── -->
    <link rel="canonical" href="https://pradeepmalhotra.com/" />

    <!-- ── Open Graph ────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pradeepmalhotra.com/" />
    <meta property="og:title" content="Pradeep Malhotra • Premium Astrology &amp; Spiritual Consultation" />
    <meta property="og:description" content="Personalized Vedic astrology consultations by Pradeep Malhotra. Expert guidance on life, career, relationships, numerology, and Vaastu." />
    <meta property="og:image" content="https://pradeepmalhotra.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Pradeep Malhotra" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ──────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pradeep Malhotra • Premium Astrology &amp; Spiritual Consultation" />
    <meta name="twitter:description" content="Personalized Vedic astrology consultations by Pradeep Malhotra. Expert guidance on life, career, relationships, numerology, and Vaastu." />
    <meta name="twitter:image" content="https://pradeepmalhotra.com/og-image.jpg" />

    <!-- ── Apple Web App ──────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pradeep Malhotra" />
    <link rel="apple-touch-icon" href="/favicon.webp" />

    <!-- ── Theme / Favicon ───────────────────────────────────────── -->
    <meta name="theme-color" content="#120428" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Hero Image Preload (LCP element) ──────────────────────── -->
    <link rel="preload" as="image" href="/src/assets/heroimg.webp" />

    <!-- ── Google Fonts — non-blocking load ──────────────────────── -->
    <!-- Trimmed to only weights actually used in the design -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload hint so browser fetches the CSS early -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,700&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" />
    <!-- Non-blocking: initially loaded as print, swapped to all on load -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,700&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap"
      media="print" onload="this.media='all'" />
    <!-- Fallback for no-JS browsers -->
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,700&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" />
    </noscript>
  </head>
  <body>
    <!-- Skip-to-content for keyboard / screen reader accessibility -->
    <a
      href="#main-content"
      style="position:absolute;top:-40px;left:0;z-index:9999;padding:8px 16px;background:#D4AF37;color:#120428;font-size:13px;font-weight:600;border-radius:0 0 8px 0;transition:top 0.2s"
      onfocus="this.style.top='0'"
      onblur="this.style.top='-40px'"
    >Skip to main content</a>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
